<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joshy Tech Academy - Admission Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    color:#0a2e5c;
}
input, select, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}
button{
    background:#0a2e5c;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;
}
button:hover{
    background:#06325e;
}
.print-area{
    display:none;
}
</style>
</head>

<body>

<div class="container">
<h2>Joshy Tech Academy Admission Form</h2>

<form id="admissionForm">

<label>Full Name</label>
<input type="text" id="fullname" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Phone Number</label>
<input type="tel" id="phone" required>

<label>Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Course Applying For</label>
<select id="course" required>
<option value="">Select Course</option>
<option>Computer Training</option>
<option>Graphic Design</option>
<option>Web Design</option>
<option>Photography</option>
<option>Digital Marketing</option>
</select>

<label>Home Address</label>
<textarea id="address" required></textarea>

<label>Upload Passport</label>
<input type="file" id="passport" accept="image/*" required>

<br><br>

<button type="button" onclick="payNow()">Pay & Submit Form</button>

</form>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payNow(){
    let email = document.getElementById("email").value;
    let fullname = document.getElementById("fullname").value;

    if(fullname === "" || email === ""){
        alert("Please fill all required fields.");
        return;
    }

    let handler = PaystackPop.setup({
        key: 'YOUR_PAYSTACK_PUBLIC_KEY', // Replace with your Paystack Public Key
        email: email,
        amount: 2000000, // 20,000 Naira (amount in kobo)
        currency: "NGN",
        callback: function(response){
            alert('Payment successful! Reference: ' + response.reference);
            generatePrint();
        },
        onClose: function(){
            alert('Transaction was not completed.');
        }
    });
    handler.openIframe();
}

function generatePrint(){
    let content = `
    <h2>Joshy Tech Academy Admission Slip</h2>
    <p><strong>Name:</strong> ${fullname.value}</p>
    <p><strong>Email:</strong> ${email.value}</p>
    <p><strong>Phone:</strong> ${phone.value}</p>
    <p><strong>Course:</strong> ${course.value}</p>
    <p><strong>Address:</strong> ${address.value}</p>
    <br><br>
    <p>Payment Status: PAID</p>
    `;

    let newWin = window.open("");
    newWin.document.write(content);
    newWin.print();
}
</script>

</body>
</html>
